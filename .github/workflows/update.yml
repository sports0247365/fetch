name: Auto Update Playlist JSON

on:
  schedule:
    # Har 15 minute baad chalega (UTC time)
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # Manually bhi "Run workflow" button se chala sakte hain

# Agar ek run chal raha ho to dusra usay cancel kar ke naya start karega,
# taake do runs ek sath push na karein (jo git conflict deta hai)
concurrency:
  group: playlist-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run transform script
        run: node scripts/transform.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Push se pehle remote ke latest changes le lein, taake conflict na ho
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i)..."
            sleep 5
          done
